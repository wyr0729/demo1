<h2>景点简介</h2>
<p>鼓浪屿位于福建省厦门市思明区，是一座宁静浪漫的海岛，素有“海上花园”“钢琴之岛”的美誉。岛上无机动车，街巷安静文艺，红砖老别墅、南洋风格建筑、三角梅四处盛放，充满复古文艺气息。这里融合自然风光与历史人文，日光岩、菽庄花园、皓月园、风琴博物馆等景点各具特色，是厦门必打卡的网红旅游胜地，适合慢行走路、拍照散心、度假放松。</p>
